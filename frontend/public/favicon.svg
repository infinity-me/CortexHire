<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="64" height="64" rx="14" fill="#080b14"/>

  <!-- Outer border glow ring -->
  <rect width="62" height="62" x="1" y="1" rx="13" fill="none" stroke="url(#grad)" stroke-width="1" opacity="0.5"/>

  <!-- Neural brain mark - circuit node cluster -->
  <!-- Center node -->
  <circle cx="32" cy="32" r="4" fill="url(#grad)" filter="url(#glow)"/>

  <!-- Top node -->
  <circle cx="32" cy="16" r="3" fill="url(#grad)" filter="url(#glow)"/>
  <!-- Bottom node -->
  <circle cx="32" cy="48" r="3" fill="url(#grad)" filter="url(#glow)"/>
  <!-- Left node -->
  <circle cx="16" cy="32" r="3" fill="url(#grad)" filter="url(#glow)"/>
  <!-- Right node -->
  <circle cx="48" cy="32" r="3" fill="url(#grad)" filter="url(#glow)"/>

  <!-- Diagonal nodes -->
  <circle cx="20" cy="20" r="2.5" fill="#7c3aed" filter="url(#glow)" opacity="0.85"/>
  <circle cx="44" cy="20" r="2.5" fill="#06b6d4" filter="url(#glow)" opacity="0.85"/>
  <circle cx="20" cy="44" r="2.5" fill="#7c3aed" filter="url(#glow)" opacity="0.85"/>
  <circle cx="44" cy="44" r="2.5" fill="#06b6d4" filter="url(#glow)" opacity="0.85"/>

  <!-- Connection lines: center to cardinal nodes -->
  <line x1="32" y1="28" x2="32" y2="19" stroke="url(#grad)" stroke-width="1.5" opacity="0.7"/>
  <line x1="32" y1="36" x2="32" y2="45" stroke="url(#grad)" stroke-width="1.5" opacity="0.7"/>
  <line x1="28" y1="32" x2="19" y2="32" stroke="url(#grad)" stroke-width="1.5" opacity="0.7"/>
  <line x1="36" y1="32" x2="45" y2="32" stroke="url(#grad)" stroke-width="1.5" opacity="0.7"/>

  <!-- Connection lines: center to diagonal nodes -->
  <line x1="29.2" y1="29.2" x2="22" y2="22" stroke="url(#grad)" stroke-width="1" opacity="0.5"/>
  <line x1="34.8" y1="29.2" x2="42" y2="22" stroke="url(#grad)" stroke-width="1" opacity="0.5"/>
  <line x1="29.2" y1="34.8" x2="22" y2="42" stroke="url(#grad)" stroke-width="1" opacity="0.5"/>
  <line x1="34.8" y1="34.8" x2="42" y2="42" stroke="url(#grad)" stroke-width="1" opacity="0.5"/>

  <!-- Cross connections: top to diagonals -->
  <line x1="32" y1="19" x2="22" y2="22" stroke="#7c3aed" stroke-width="0.8" opacity="0.4"/>
  <line x1="32" y1="19" x2="42" y2="22" stroke="#06b6d4" stroke-width="0.8" opacity="0.4"/>
  <line x1="32" y1="45" x2="22" y2="42" stroke="#7c3aed" stroke-width="0.8" opacity="0.4"/>
  <line x1="32" y1="45" x2="42" y2="42" stroke="#06b6d4" stroke-width="0.8" opacity="0.4"/>
  <line x1="19" y1="32" x2="22" y2="22" stroke="#7c3aed" stroke-width="0.8" opacity="0.4"/>
  <line x1="19" y1="32" x2="22" y2="42" stroke="#7c3aed" stroke-width="0.8" opacity="0.4"/>
  <line x1="45" y1="32" x2="42" y2="22" stroke="#06b6d4" stroke-width="0.8" opacity="0.4"/>
  <line x1="45" y1="32" x2="42" y2="42" stroke="#06b6d4" stroke-width="0.8" opacity="0.4"/>
</svg>
