version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: cortexhire_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cortexhire
      POSTGRES_PASSWORD: cortexhire_secret
      POSTGRES_DB: cortexhire
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cortexhire"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: cortexhire_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: cortexhire_neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/cortexhire_secret
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474"]
      interval: 15s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
